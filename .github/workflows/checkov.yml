name: 🕵️ Checkov Security Scan

on:
  pull_request:
    types: ['opened', 'reopened', 'synchronize']
  workflow_dispatch:

permissions: read-all

jobs:
  scan:
    permissions:
      contents: read # for actions/checkout to fetch code
#      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
#      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔎 Checkov GitHub Action
        uses: bridgecrewio/checkov-action@v12
        with:
          # All options: https://github.com/bridgecrewio/checkov-action/blob/master/action.yml
          compact : true # Do not display code blocks in output
          log_level: WARNING
          output_format: cli,sarif,github_failed_only
          output_file_path: console,results.sarif,github_failed_only
          quiet: true # display only failed checks
          soft_fail: true # if true, do not return an error code if there are failed checks

      - name: 📝 Show results in summary
        if: always()
        run: cat github_failed_only >> $GITHUB_STEP_SUMMARY