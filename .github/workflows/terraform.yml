name: "👷 Terraform Build & Destroy "

on:
  pull_request:
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'      
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_CLOUD_ORGANIZATION: "emolinam5"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  TF_WORKSPACE: "lab-video-platform"
  CONFIG_DIRECTORY: "."

jobs:
  plan:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    name: "📝 Terraform Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      run_id: ${{ steps.plan-run.outputs.run_id }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📤 Upload configuration to HCP
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        id: plan-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}
          speculative: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'plan') }}

      - name: 📝 Create plan run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: plan-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.plan-upload.outputs.configuration_version_id }}
          plan_only: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'plan') }}
          is_destroy: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy' }}

      - name: 📝 Get plan output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.0.0
        id: plan-output
        with:
          plan: ${{ fromJSON(steps.plan-run.outputs.payload).data.relationships.plan.data.id }}

      - name: 📝 Plan summary
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Add | ${{ steps.plan-output.outputs.add }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Change | ${{ steps.plan-output.outputs.change }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Destroy | ${{ steps.plan-output.outputs.destroy }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View full plan in Terraform Cloud](${{ steps.plan-run.outputs.run_link }})" >> $GITHUB_STEP_SUMMARY

  apply:
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'apply')
    name: "🚀 Terraform Apply"
    runs-on: ubuntu-latest
    environment: tf-apply
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🚀 Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.0.0
        id: apply
        with:
          run: ${{ needs.plan.outputs.run_id }}
          comment: "Apply run triggered from GitHub Actions by ${{ github.actor }} (${{ github.sha }})"

  destroy:
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy'
    name: "🔥 Terraform Destroy"
    runs-on: ubuntu-latest
    environment: tf-apply
    permissions:
      contents: read
    steps:
      - name: 🔥 Destroy
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.0.0
        id: apply-destroy
        with:
          run: ${{ needs.plan.outputs.run_id }}
          comment: "Destroy run triggered from GitHub Actions by ${{ github.actor }} (${{ github.sha }})"
